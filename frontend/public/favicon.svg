<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded blue background tile (matches UI blue-600) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Descending trend bars (cost going down) -->
  <rect x="10" y="30" width="7"  height="20" rx="1.5" fill="url(#bar)" opacity="0.95"/>
  <rect x="20" y="36" width="7"  height="14" rx="1.5" fill="url(#bar)" opacity="0.85"/>
  <rect x="30" y="42" width="7"  height="8"  rx="1.5" fill="url(#bar)" opacity="0.75"/>

  <!-- Downward trend arrow over the bars -->
  <path d="M13 26 L24 32 L34 28 L46 18"
        fill="none"
        stroke="#ffffff"
        stroke-width="2.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>
  <path d="M46 18 L40 18 M46 18 L46 24"
        fill="none"
        stroke="#ffffff"
        stroke-width="2.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>

  <!-- Dollar sign in top-right -->
  <circle cx="48" cy="44" r="11" fill="#ffffff"/>
  <text x="48" y="49"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="800"
        font-size="16"
        text-anchor="middle"
        fill="#1d4ed8">$</text>
</svg>
